name: "MLX Handshake (Explicit Parameters)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Sync & Handshake
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          # Discovery Loop
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done
          
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi
          export MASTER_PORT=12345

          cat <<EOF > smoke_test.py
          import os, sys, time, socket
          import mlx.core as mx
          import mlx.core.distributed as dist

          def sync_barrier(role, addr, port):
              if role == "0":
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind((addr, port))
                      s.listen(1)
                      conn, _ = s.accept()
                      conn.close()
              else:
                  start_time = time.time()
                  while time.time() - start_time < 60:
                      try:
                          with socket.create_connection((addr, port), timeout=2):
                              return
                      except:
                          time.sleep(1)

          def main():
              rank = int(os.environ["RANK"])
              addr = os.environ["MASTER_ADDR"]
              port = int(os.environ["MASTER_PORT"])
              
              # 1. Sync
              sync_barrier(str(rank), addr, port)
              time.sleep(2) # Buffer to let the OS socket close

              # 2. MLX Handshake with EXPLICIT world group creation
              print(f"Rank {rank}: Initializing MLX Group...")
              try:
                  # We use the init() to set the environment, then explicitly check group size
                  dist.init()
                  
                  # If global init fails to find peers, we force the group creation
                  # In MLX, we can access the default group via dist.is_available() checks
                  if dist.size() < 2:
                      # Final attempt: Re-init with explicit env force
                      os.environ["MLX_DISTRIBUTED_REDEZVOUS"] = f"tcp://{addr}:{port}"
                      dist.init()

                  if dist.size() < 2:
                      raise RuntimeError(f"Still Singleton. Size: {dist.size()}")

                  print(f"✅ Cluster Linked! Rank {dist.rank()} of {dist.size()}")

                  if dist.rank() == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0)
                      print("📤 Rank 1: Sent Tensor.")
                  else:
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      print("✨ HANDSHAKE COMPLETE")
              except Exception as e:
                  print(f"❌ MLX Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
