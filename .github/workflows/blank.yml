name: "MLX Distributed Handshake (Sync-Lock)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset

      - name: 🐍 Setup Environment
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🚀 Sync & Handshake
        run: |
          MY_IP=$(tailscale ip -4)
          
          # 1. Wait for Peer to appear in Tailscale
          echo "My IP: $MY_IP. Waiting for peer..."
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            if [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]]; then
              echo "Found Peer: $PEER_IP"
              # Ping the peer to ensure the WireGuard tunnel is actually carrying traffic
              if ping -c 1 -W 1 "$PEER_IP" > /dev/null; then
                echo "Peer is reachable."
                break
              fi
            fi
            sleep 2
          done

          if [[ -z "$PEER_IP" ]]; then echo "Error: Peer discovery timeout"; exit 1; fi

          # 2. Set Standard MLX Env Vars
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi
          export MASTER_PORT=12345
          export WORLD_SIZE=2

          # 3. Create script using standard Environment Variables
          cat <<EOF > smoke_test.py
          import os, sys, time
          import mlx.core as mx
          import mlx.core.distributed as dist

          def main():
              # Log what the environment looks like to the C++ backend
              print(f"RANK: {os.environ.get('RANK')}, MASTER: {os.environ.get('MASTER_ADDR')}")
              
              try:
                  # Use the standard init() which reads from ENV
                  # Adding a small sleep to ensure both processes hit this at roughly the same time
                  time.sleep(5) 
                  group = dist.init()
                  
                  rank = group.rank()
                  if rank == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0, group=group)
                      print("📤 Rank 1: Sent Tensor")
                  else:
                      print("📥 Rank 0: Waiting for data...")
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1, group=group)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      print("✨ HANDSHAKE COMPLETE")
              except Exception as e:
                  print(f"❌ Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
