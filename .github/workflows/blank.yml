name: "MLX Handshake (Final Consensus)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Atomic Handshake
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          # Discovery
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done
          
          # Roles
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi
          export MASTER_PORT=12345
          export WORLD_SIZE=2

          # SYNC BARRIER: Rank 1 waits for Rank 0's Port to be LIVE
          if [[ "$RANK" == "1" ]]; then
            echo "Worker: Probing Master at $MASTER_ADDR:$MASTER_PORT..."
            until nc -z -v -w5 "$MASTER_ADDR" "$MASTER_PORT"; do
              echo "Waiting for Master port..."
              sleep 2
            done
            echo "Master is LIVE. Starting Python..."
          fi

          cat <<EOF > smoke_test.py
          import os, sys, time
          import mlx.core as mx
          import mlx.core.distributed as dist

          def main():
              # Explicitly set these for the C++ backend
              os.environ["MASTER_ADDR"] = "$MASTER_ADDR"
              os.environ["MASTER_PORT"] = "$MASTER_PORT"
              os.environ["RANK"] = "$RANK"
              os.environ["WORLD_SIZE"] = "2"
              
              print(f"--- [Rank {os.environ['RANK']}] Starting Handshake ---")
              
              try:
                  # Use 'ring' backend for reliable TCP over Tailscale
                  group = dist.init(backend="ring")
                  
                  if group.size() < 2:
                      raise RuntimeError(f"Singleton Error: Size is {group.size()}")

                  print(f"✅ Cluster Formed! Size: {group.size()}")

                  if group.rank() == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0, group=group)
                      print("📤 Rank 1: Data Sent.")
                  else:
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1, group=group)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      print("✨ HANDSHAKE COMPLETE")
              except Exception as e:
                  print(f"❌ Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
