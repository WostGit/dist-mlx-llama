name: "MLX Handshake (Raw List Edition)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Sync & Atomic Handshake
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          # 1. Peer Discovery
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done
          
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_IP=$MY_IP
            export WORKER_IP=$PEER_IP
            export MY_RANK=0
          else
            export MASTER_IP=$PEER_IP
            export WORKER_IP=$MY_IP
            export MY_RANK=1
          fi

          # 3. Create JSON List Hostfile (Standard Ring Format)
          # Format: ["IP:PORT", "IP:PORT"]
          PORT=12345
          echo "[\"$MASTER_IP:$PORT\", \"$WORKER_IP:$PORT\"]" > hostfile.json
          echo "--- Hostfile ---"
          cat hostfile.json

          # 4. MLX Env Vars
          export MLX_RANK=$MY_RANK
          export MLX_WORLD_SIZE=2
          export MLX_HOSTFILE=$(pwd)/hostfile.json

          cat <<EOF > smoke_test.py
          import os, sys, time, socket, json
          import mlx.core as mx
          import mlx.core.distributed as dist

          def sync_barrier(role, addr, port):
              if role == "0":
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind((addr, port))
                      s.listen(1)
                      s.accept()[0].close()
              else:
                  start = time.time()
                  while time.time() - start < 60:
                      try:
                          socket.create_connection((addr, port), timeout=2).close()
                          return
                      except:
                          time.sleep(2)

          def main():
              rank = os.environ["MLX_RANK"]
              with open(os.environ["MLX_HOSTFILE"], 'r') as f:
                  hosts = json.load(f)
              
              # Use port 12346 for sync to keep 12345 for MLX
              master_ip = hosts[0].split(":")[0]
              sync_barrier(rank, master_ip, 12346)
              time.sleep(2)

              print(f"--- [Rank {rank}] MLX Cluster Init ---")
              try:
                  # Force RING backend with strict checking
                  world = dist.init(strict=True, backend="ring")
                  
                  print(f"✅ Cluster Linked! Size: {world.size()}")

                  if world.rank() == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0, group=world)
                      print("📤 Rank 1: Sent Tensor.")
                  else:
                      print("📥 Rank 0: Waiting for data...")
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1, group=world)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      print("✨ HANDSHAKE COMPLETE")
              except Exception as e:
                  print(f"❌ MLX Failed: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
