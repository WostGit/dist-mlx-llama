name: "MLX Distributed Handshake"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset

      - name: 🐍 Surgical Install
        # Force installation to the specific python3 environment
        run: python3 -m pip install --upgrade pip mlx

      - name: 🚀 Tensor Handshake
        run: |
          MY_IP=$(tailscale ip -4)
          
          # 1. Peer Discovery
          for i in {1..20}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            echo "Searching for peer... ($i/20)"
            sleep 5
          done

          if [[ -z "$PEER_IP" ]]; then echo "Peer timeout"; exit 1; fi

          # 2. Role Assignment
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi

          # 3. Execution (Using Heredoc for clean environment passing)
          python3 <<EOF
          import os, sys
          import subprocess

          # Debug: Print where we are looking for modules
          print(f"Python Executable: {sys.executable}")
          
          try:
              import mlx.core as mx
              import mlx.distributed as dist
              print("✅ MLX Import Successful")
          except ImportError as e:
              print(f"❌ MLX still not found: {e}")
              print("Search paths:", sys.path)
              sys.exit(1)

          # Set distributed environment variables
          os.environ["MASTER_ADDR"] = "$MASTER_ADDR"
          os.environ["MASTER_PORT"] = "12345"
          os.environ["RANK"] = "$RANK"
          os.environ["WORLD_SIZE"] = "2"

          print(f"Initializing Dist on Rank {os.environ['RANK']} (Master: {os.environ['MASTER_ADDR']})...")
          
          try:
              dist.init()
              rank = dist.rank()

              if rank == 1:
                  x = mx.array([42.0, 1337.0])
                  dist.send(x, dst=0)
                  print("📤 Rank 1: Sent Tensor [42.0, 1337.0]")
              else:
                  y = mx.zeros((2,))
                  y = dist.recv(y, src=1)
                  print(f"📥 Rank 0 Received: {y}")
                  if mx.array_equal(y, mx.array([42.0, 1337.0])):
                      print("✨ HANDSHAKE COMPLETE: Peer-to-Peer AI Cluster Active")
          except Exception as e:
              print(f"❌ Distributed Operation Failed: {e}")
              sys.exit(1)
          EOF
