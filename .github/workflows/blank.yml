name: "MLX Distributed Handshake (DNS-Fix)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      # FIX 1: Install EVERYTHING while the internet still works
      - name: 🐍 Pre-Install MLX
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      # FIX 2: Join Tailnet but DON'T break DNS
      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 Sync & Handshake
        run: |
          # The rest of your logic remains the same
          MY_IP=$(tailscale ip -4)
          
          # Discovery loop...
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done

          # Set Env Vars
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi
          export MASTER_PORT=12345
          export WORLD_SIZE=2

          # Run the Python script (already created in previous step)
          ./venv/bin/python3 smoke_test.py
