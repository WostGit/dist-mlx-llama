name: "MLX Resilient Distributed Test (Chaos Edition)"
on: workflow_dispatch

jobs:
  distributed-training:
    runs-on: macos-15
    timeout-minutes: 15  # Extension 1: Hard stop to prevent billing runaway
    strategy:
      fail-fast: false   # Extension 2: Don't kill Rank 0 just because Rank 1 crashed
      matrix:
        rank: [0, 1]
    
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment & Network Shaping
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip mlx
          
          # Extension 3: Network Shaping (Simulate 50ms latency & jitter)
          # This tests if MLX's "ring" backend can handle imperfect real-world links
          (sudo dnctl pipe 1 config delay 50ms && \
           sudo dnctl add 1 pipe 1 ip from any to any) || echo "Network shaping skipped"

      - name: 🛡️ 2. Secure Tailnet Join
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Hardened Distributed SGD
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          # Extension 4: Improved Peer Discovery with Timeout
          for i in {1..30}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            echo "Waiting for peer... ($i/30)"
            sleep 5
          done

          if [[ -z "$PEER_IP" || "$PEER_IP" == "null" ]]; then
            echo "❌ ERROR: Peer discovery timed out. Connectivity failure."
            exit 1
          fi

          # Role Assignment
          [[ "$MY_IP" < "$PEER_IP" ]] && { ROLE=0; MASTER=$MY_IP; WORKER=$PEER_IP; } || { ROLE=1; MASTER=$PEER_IP; WORKER=$MY_IP; }
          echo "[\"$MASTER:12345\", \"$WORKER:12345\"]" > hostfile.json

          cat <<EOF > train_hardened.py
          import os, sys, time, socket, json, signal
          import mlx.core as mx
          import mlx.core.distributed as dist

          # Extension 5: Global Watchdog Timer
          # Kills the process if any collective operation deadlocks
          def watchdog(signum, frame):
              print("\n🚨 CRITICAL FAILURE: Process deadlocked for >60s. Terminating.")
              sys.exit(2)
          signal.signal(signal.SIGALRM, watchdog)
          signal.alarm(60) 

          def sync_barrier(role, addr, port):
              try:
                  if role == "0":
                      with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                          s.settimeout(45)
                          s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                          s.bind((addr, port)); s.listen(1)
                          s.accept()[0].close()
                  else:
                      start = time.time()
                      while time.time() - start < 45:
                          try:
                              socket.create_connection((addr, port), timeout=2).close()
                              return
                          except: time.sleep(1)
                      raise TimeoutError("Handshake failed")
              except Exception as e:
                  print(f"❌ Barrier Error: {e}"); sys.exit(1)

          def main():
              rank = int("$ROLE")
              with open("hostfile.json", 'r') as f:
                  hosts = json.load(f)
              
              print(f"Node {rank} initiating handshake...")
              sync_barrier(str(rank), hosts[0].split(":")[0], 12346)

              try:
                  # Extension 6: Strict Initialization
                  world = dist.init(strict=True, backend="ring")
                  print(f"✅ Rank {rank}: Cluster Active. Size: {world.size()}")

                  # Extension 7: Chaos Injection (Simulate failure on Rank 1)
                  # Uncomment the next lines to test "Partial Cluster Failure"
                  # if rank == 1:
                  #     print("🔥 CHAOS: Simulating node crash...")
                  #     sys.exit(1)

                  weights = mx.array([10.0, 10.0])
                  grad = mx.array([float(rank + 1), float(rank + 1)])

                  # The "Danger Zone" - All nodes must reach this or all will hang
                  print(f"Rank {rank}: Synchronizing...")
                  global_sum = dist.all_sum(grad, group=world)
                  
                  # Final verification
                  avg_grad = global_sum / world.size()
                  weights = weights - (0.1 * avg_grad)
                  
                  if not mx.allclose(weights, mx.array([9.85, 9.85])):
                      print(f"❌ CONSENSUS FAILURE: Result {weights.tolist()}")
                      sys.exit(1)
                  
                  print(f"✨ SUCCESS: Node {rank} completed step.")
                  signal.alarm(0) # Disable watchdog

              except Exception as e:
                  print(f"❌ MLX Runtime Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 train_hardened.py
