name: "MLX 4-Node Distributed Llama Test"
on: workflow_dispatch

jobs:
  distributed-llama:
    runs-on: macos-15
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        rank: [0, 1, 2, 3] # Scaled to 4 nodes
    
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Distributed Llama Layer Training
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          echo "🔍 Local IP: $MY_IP. Waiting for 3 peers..."
          # Discovery loop modified to wait for 4 total nodes
          for i in {1..100}; do
            PEER_COUNT=$(tailscale status --json | jq '.Peer | length')
            if [ "$PEER_COUNT" -ge 3 ]; then break; fi
            sleep 3
          done

          # Get all IPs in the tailnet with this tag
          ALL_IPS=$(tailscale status --json | jq -r '.Peer[] | .TailscaleIPs[0]')
          # Include myself and sort to ensure all nodes have the exact same list
          HOST_LIST=$(echo -e "$MY_IP\n$ALL_IPS" | sort | jq -R . | jq -s -c .)
          
          export MLX_RANK=$(echo "$HOST_LIST" | jq -r --arg me "$MY_IP" 'index($me)')
          export MLX_WORLD_SIZE=4
          export MLX_HOSTFILE=$(pwd)/hostfile.json
          
          # Format hostfile as ["IP1:12345", "IP2:12345", ...]
          echo "$HOST_LIST" | jq -c 'map(. + ":12345")' > $MLX_HOSTFILE
          MASTER_IP=$(echo "$HOST_LIST" | jq -r '.[0]')

          echo "📋 Node Config: Rank=$MLX_RANK | Master=$MASTER_IP | Total=4"

          cat <<EOF > llama_dist.py
          import os, sys, time, socket, json, signal
          import mlx.core as mx
          import mlx.nn as nn
          import mlx.core.distributed as dist

          signal.signal(signal.SIGALRM, lambda s, f: sys.exit("🚨 Timeout"))
          signal.alarm(180) 

          def sync_barrier(rank, master_ip, port, world_size):
              if rank == 0:
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind(('0.0.0.0', port)); s.listen(world_size - 1)
                      for _ in range(world_size - 1):
                          conn, _ = s.accept()
                          conn.close()
              else:
                  connected = False
                  while not connected:
                      try:
                          socket.create_connection((master_ip, port), timeout=2).close()
                          connected = True
                      except: time.sleep(2)

          def main():
              rank = int(os.environ["MLX_RANK"])
              world_size = int(os.environ["MLX_WORLD_SIZE"])
              with open(os.environ["MLX_HOSTFILE"], 'r') as f:
                  hosts = json.load(f)
              
              master_ip = hosts[0].split(":")[0]
              sync_barrier(rank, master_ip, 12346, world_size)

              try:
                  world = dist.init(strict=True)
                  
                  # 1. Define a Llama-style Linear Layer (e.g., Hidden Dim 4096)
                  model = nn.Linear(512, 1024) 
                  
                  # 2. Ensure all nodes start with the SAME weights
                  # In real training, Rank 0 would broadcast weights to others
                  mx.random.seed(42) 
                  
                  # 3. Dummy Forward Pass
                  # Each node sees a different "batch" of data
                  input_data = mx.random.normal((8, 512)) 
                  output = model(input_data)
                  loss = output.sum()

                  # 4. Backward Pass (Local Gradients)
                  # In MLX, we use value_and_grad to get gradients
                  def loss_fn(model, x):
                      return model(x).sum()
                  
                  vg_fn = nn.value_and_grad(model, loss_fn)
                  loss, grads = vg_fn(model, input_data)

                  # 5. Distributed All-Reduce (The Heart of Distributed Llama)
                  # We average the gradients across all 4 nodes
                  print(f"Rank {rank}: Synchronizing Llama layer gradients...")
                  
                  def sync_grads(grads):
                      for k, v in grads.items():
                          if isinstance(v, dict):
                              sync_grads(v)
                          else:
                              # Sum across all 4 nodes and average
                              summed = dist.all_sum(v, group=world)
                              grads[k] = summed / world.size()

                  sync_grads(grads)

                  # 6. Apply Gradients (SGD Step)
                  optimizer = nn.optim.SGD(learning_rate=0.01)
                  optimizer.update(model, grads)
                  mx.eval(model.parameters())

                  print(f"✨ SUCCESS: Rank {rank} finished Llama layer update.")

              except Exception as e:
                  print(f"❌ MLX Error: {e}"); sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 llama_dist.py
