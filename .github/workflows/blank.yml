name: "MLX Extended Distributed Training Test"
on: workflow_dispatch

jobs:
  distributed-sgd:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Distributed SGD Simulation
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done
          
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_IP=$MY_IP; export WORKER_IP=$PEER_IP; export MY_RANK=0
          else
            export MASTER_IP=$PEER_IP; export WORKER_IP=$MY_IP; export MY_RANK=1
          fi

          echo "[\"$MASTER_IP:12345\", \"$WORKER_IP:12345\"]" > hostfile.json
          
          export MLX_RANK=$MY_RANK
          export MLX_WORLD_SIZE=2
          export MLX_HOSTFILE=$(pwd)/hostfile.json

          cat <<EOF > train_smoke_test.py
          import os, sys, time, socket, json
          import mlx.core as mx
          import mlx.core.distributed as dist

          def sync_barrier(role, addr, port):
              if role == "0":
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind((addr, port)); s.listen(1)
                      s.accept()[0].close()
              else:
                  start = time.time()
                  while time.time() - start < 60:
                      try:
                          socket.create_connection((addr, port), timeout=2).close()
                          return
                      except: time.sleep(2)

          def main():
              rank = int(os.environ["MLX_RANK"])
              with open(os.environ["MLX_HOSTFILE"], 'r') as f:
                  hosts = json.load(f)
              master_ip = hosts[0].split(":")[0]
              
              sync_barrier(str(rank), master_ip, 12346)
              time.sleep(2)

              try:
                  world = dist.init(strict=True, backend="ring")
                  print(f"✅ Rank {rank}: Cluster Active.")

                  # 1. Initialize 'Model Weights' (Identical on both nodes)
                  weights = mx.array([10.0, 10.0])
                  learning_rate = 0.1

                  # 2. Local Gradient Calculation
                  # Imagine Rank 0 sees data [1, 1] and Rank 1 sees [2, 2]
                  local_gradient = mx.array([float(rank + 1), float(rank + 1)])
                  print(f"Rank {rank}: Local Gradient computed: {local_gradient.tolist()}")

                  # 3. Global All-Reduce (The Heart of Distributed Training)
                  # This sums gradients from all nodes and distributes the result
                  print(f"Rank {rank}: Synchronizing gradients...")
                  global_grad_sum = dist.all_sum(local_gradient, group=world)
                  avg_gradient = global_grad_sum / world.size()
                  
                  # 4. Update Weights
                  weights = weights - (learning_rate * avg_gradient)
                  
                  # 5. Verify Consensus
                  # Expected: (1+2)/2 = 1.5. New weights: 10 - (0.1 * 1.5) = 9.85
                  expected = 9.85
                  print(f"Rank {rank}: Updated Weights: {weights.tolist()}")
                  
                  if abs(weights[0].item() - expected) < 1e-5:
                      print("✨ SUCCESS: Weights are synchronized and training step validated.")
                  else:
                      print(f"❌ CONSENSUS FAILURE: Expected {expected}, got {weights[0].item()}")
                      sys.exit(1)

              except Exception as e:
                  print(f"❌ Error: {e}"); sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 train_smoke_test.py
