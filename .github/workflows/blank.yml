name: "MLX Handshake (Strict Consensus)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Sync & Handshake
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          # Discovery
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done
          
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi
          export MASTER_PORT=12345

          cat <<EOF > smoke_test.py
          import os, sys, time, socket
          import mlx.core as mx
          import mlx.core.distributed as dist

          def sync_barrier(role, addr, port):
              """Rigorous TCP handshake before MLX starts."""
              if role == "0":
                  print(f"Rank 0: Hosting sync at {addr}:{port}...")
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind((addr, port))
                      s.listen(1)
                      s.settimeout(60)
                      conn, _ = s.accept()
                      conn.sendall(b"READY")
                      conn.close()
              else:
                  print(f"Rank 1: Connecting to Master at {addr}:{port}...")
                  start = time.time()
                  while time.time() - start < 60:
                      try:
                          with socket.create_connection((addr, port), timeout=2) as s:
                              if s.recv(10) == b"READY":
                                  print("Rank 1: Sync Confirmed.")
                                  return
                      except:
                          time.sleep(2)
                  raise RuntimeError("Sync Timeout")

          def main():
              rank = int(os.environ["RANK"])
              addr = os.environ["MASTER_ADDR"]
              port = int(os.environ["MASTER_PORT"])
              
              sync_barrier(str(rank), addr, port)
              time.sleep(5) # Let OS release ports

              print(f"Rank {rank}: Forcing MLX initialization...")
              try:
                  # STRICT=True forces MLX to fail if it can't find a peer 
                  # instead of silently becoming a singleton.
                  world = dist.init(strict=True, backend="ring")
                  
                  print(f"✅ Cluster Linked! Size: {world.size()}")

                  if world.rank() == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0, group=world)
                      print("📤 Rank 1: Sent.")
                  else:
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1, group=world)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      print("✨ HANDSHAKE COMPLETE")
              except Exception as e:
                  print(f"❌ MLX Initialization Failed: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
