name: "MLX Handshake (Python Sync)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Sync & Handshake
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          # Discovery Loop
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done
          
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi
          export MASTER_PORT=12345

          # Atomic Write and Run
          cat <<EOF > smoke_test.py
          import os, sys, time, socket
          import mlx.core as mx
          import mlx.core.distributed as dist

          def sync_barrier(role, addr, port):
              """Ensures both nodes are online before MLX takes over."""
              if role == "0":
                  print(f"Rank 0: Opening sync socket on {addr}:{port}...")
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind((addr, port))
                      s.listen(1)
                      conn, _ = s.accept()
                      conn.close()
                  print("Rank 0: Sync confirmed. Peer connected.")
              else:
                  print(f"Rank 1: Probing Master at {addr}:{port}...")
                  start_time = time.time()
                  while time.time() - start_time < 120:
                      try:
                          with socket.create_connection((addr, port), timeout=2):
                              print("Rank 1: Sync confirmed. Connected to Master.")
                              return
                      except (ConnectionRefusedError, socket.timeout):
                          time.sleep(2)
                  raise RuntimeError("Sync Barrier Timeout")

          def main():
              rank = os.environ["RANK"]
              addr = os.environ["MASTER_ADDR"]
              port = int(os.environ["MASTER_PORT"])
              
              # 1. Physical Sync
              sync_barrier(rank, addr, port)
              
              # 2. Wait 2 seconds to allow OS to clear the socket
              time.sleep(2)

              # 3. MLX Handshake
              print(f"Rank {rank}: Initializing MLX Distributed...")
              try:
                  # Force 'ring' (TCP) backend
                  group = dist.init(backend="ring")
                  
                  if group.size() < 2:
                      raise RuntimeError("Singleton Error: Still size 1 after sync.")

                  if group.rank() == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0, group=group)
                      print("📤 Rank 1: Sent Tensor.")
                  else:
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1, group=group)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      print("✨ HANDSHAKE COMPLETE")
              except Exception as e:
                  print(f"❌ MLX Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
