name: "MLX Handshake (Final Fixed API)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Sync & Handshake
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          # Peer Discovery
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done
          
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi
          export MASTER_PORT=12345

          cat <<EOF > smoke_test.py
          import os, sys, time, socket
          import mlx.core as mx
          import mlx.core.distributed as dist

          def sync_barrier(role, addr, port):
              if role == "0":
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind((addr, port))
                      s.listen(1)
                      conn, _ = s.accept()
                      conn.close()
              else:
                  start_time = time.time()
                  while time.time() - start_time < 60:
                      try:
                          with socket.create_connection((addr, port), timeout=2):
                              return
                      except:
                          time.sleep(1)

          def main():
              rank_env = os.environ["RANK"]
              addr = os.environ["MASTER_ADDR"]
              port = int(os.environ["MASTER_PORT"])
              
              # 1. Physical Sync Barrier
              sync_barrier(rank_env, addr, port)
              time.sleep(2)

              print(f"--- [Rank {rank_env}] Initializing MLX Group ---")
              try:
                  # THE KEY: Capture the returned Group object
                  world = dist.init()
                  
                  # Call methods on the group object, not the module
                  actual_rank = world.rank()
                  actual_size = world.size()
                  
                  if actual_size < 2:
                      raise RuntimeError(f"Singleton Error: Handshake failed (Size: {actual_size})")

                  print(f"✅ Cluster Formed! Rank {actual_rank} of {actual_size}")

                  if actual_rank == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0, group=world)
                      print("📤 Rank 1: Sent Tensor.")
                  else:
                      print("📥 Rank 0: Waiting for data...")
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1, group=world)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      print("✨ HANDSHAKE COMPLETE")
              except Exception as e:
                  print(f"❌ Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
