name: "MLX Distributed Handshake (Consensus Fix)"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset

      - name: 🐍 Setup Hermetic Environment
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          ./venv/bin/python3 -m pip install mlx
          ./venv/bin/python3 -c "import mlx.core.distributed as dist; print('✅ MLX Backend Verified')"

      - name: 🚀 Distributed Handshake
        run: |
          MY_IP=$(tailscale ip -4)
          
          # 1. Peer Discovery (Waiting for the "other" runner to join Tailnet)
          for i in {1..40}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            echo "Searching for peer... ($i/40)"
            sleep 5
          done

          if [[ -z "$PEER_IP" ]]; then echo "Error: Peer timeout"; exit 1; fi

          # 2. Roles
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP
            export RANK=0
          else
            export MASTER_ADDR=$PEER_IP
            export RANK=1
          fi

          # 3. Create standalone script with Explicit Init
          cat <<EOF > smoke_test.py
          import os, sys
          import mlx.core as mx
          import mlx.core.distributed as dist

          def main():
              addr = "$MASTER_ADDR"
              port = 12345
              rank = int("$RANK")
              world_size = 2

              print(f"Rank {rank} attempting to join cluster at {addr}:{port}...")
              
              try:
                  # THE FIX: Explicitly pass parameters to break the singleton
                  group = dist.init(
                      get_master_addr=lambda: addr,
                      get_master_port=lambda: port,
                      get_rank=lambda: rank,
                      get_world_size=lambda: world_size
                  )
                  
                  actual_rank = group.rank()
                  actual_size = group.size()
                  print(f"✨ Cluster Joined: Rank {actual_rank} of {actual_size}")

                  if actual_rank == 1:
                      x = mx.array([42.0, 1337.0])
                      dist.send(x, dst=0, group=group)
                      print("📤 Rank 1: Sent Tensor")
                  else:
                      print("📥 Rank 0: Waiting for data...")
                      y = dist.recv(shape=[2], dtype=mx.float32, src=1, group=group)
                      print(f"📥 Rank 0 Received: {y.tolist()}")
                      
                      if mx.array_equal(y, mx.array([42.0, 1337.0])):
                          print("✨ HANDSHAKE COMPLETE: Peer-to-Peer AI Cluster Active.")
                      else:
                          sys.exit(1)
              except Exception as e:
                  print(f"❌ Distributed Runtime Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 smoke_test.py
