name: "MLX Distributed: The StackOverflow Fix"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4
      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset

      - name: 🐍 Force Fresh MLX
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip
          # Force reinstall to ensure the distributed components are built/linked
          ./venv/bin/python3 -m pip install --force-reinstall mlx

      - name: 🚀 Handshake
        run: |
          MY_IP=$(tailscale ip -4)
          PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
          
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
            export MASTER_ADDR=$MY_IP; export RANK=0
          else
            export MASTER_ADDR=$PEER_IP; export RANK=1
          fi

          ./venv/bin/python3 <<EOF
          import os, sys
          import mlx.core as mx

          # Logic found in MLX Issue #1240
          try:
              from mlx.core import distributed as dist
              print("✅ Success: Imported via mlx.core.distributed")
          except ImportError:
              try:
                  import mlx.distributed as dist
                  print("✅ Success: Imported via mlx.distributed")
              except ImportError:
                  print("❌ Error: Distributed module is physically missing from the install.")
                  sys.exit(1)

          os.environ.update({"MASTER_ADDR": "$MASTER_ADDR", "MASTER_PORT": "12345", "RANK": "$RANK", "WORLD_SIZE": "2"})
          
          dist.init()
          if dist.rank() == 1:
              dist.send(mx.array([42.0]), dst=0)
              print("📤 Sent")
          else:
              val = dist.recv(mx.zeros((1,)), src=1)
              print(f"📥 Received: {val}")
              print("✨ DAWN SONG HANDSHAKE COMPLETE")
          EOF
