name: "MLX Resilient Distributed Test (Chaos Edition)"
on: workflow_dispatch

jobs:
  distributed-training:
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        rank: [0, 1]
    
    steps:
      - uses: actions/checkout@v4

      - name: ЁЯРН 1. Environment Setup
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip mlx
          
          # Fixed macOS Network Shaping Syntax
          (sudo dnctl pipe 1 config delay 50ms && \
           echo "dummynet out proto tcp from any to any pipe 1" | sudo pfctl -f - -E) || echo "тЪая╕П Network shaping skipped"

      - name: ЁЯЫбя╕П 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: ЁЯЪА 3. Hardened Distributed SGD
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          echo "ЁЯФН Local IP: $MY_IP. Waiting for peer..."
          for i in {1..60}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 2
          done

          if [[ -z "$PEER_IP" || "$PEER_IP" == "null" ]]; then
            echo "тЭМ ERROR: Peer discovery timed out."
            exit 1
          fi

          if [[ "$MY_IP" < "$PEER_IP" ]]; then
             export MLX_RANK=0
             MASTER_IP=$MY_IP
          else
             export MLX_RANK=1
             MASTER_IP=$PEER_IP
          fi

          export MLX_WORLD_SIZE=2
          export MLX_HOSTFILE=$(pwd)/hostfile.json
          # Correct JSON format for hostfile
          echo "[\"$MY_IP:12345\", \"$PEER_IP:12345\"]" | jq -c 'sort' > $MLX_HOSTFILE

          echo "ЁЯУЛ Node Config: Rank=$MLX_RANK | Master=$MASTER_IP | Peer=$PEER_IP"

          cat <<EOF > train_hardened.py
          import os, sys, time, socket, json, signal
          import mlx.core as mx
          import mlx.core.distributed as dist

          # 90-second watchdog for the whole script
          signal.signal(signal.SIGALRM, lambda s, f: sys.exit("ЁЯЪи Watchdog Timeout"))
          signal.alarm(120) 

          def sync_barrier(rank, master_ip, port):
              if rank == 0:
                  print(f"Rank 0: Opening sync port on {port}...")
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.settimeout(60)
                      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      s.bind(('0.0.0.0', port))
                      s.listen(1)
                      conn, _ = s.accept()
                      conn.close()
              else:
                  print(f"Rank 1: Attempting to connect to Master at {master_ip}:{port}...")
                  start = time.time()
                  while time.time() - start < 60:
                      try:
                          socket.create_connection((master_ip, port), timeout=2).close()
                          return
                      except: time.sleep(2)
                  raise TimeoutError("Could not reach Rank 0")

          def main():
              rank = int(os.environ["MLX_RANK"])
              with open(os.environ["MLX_HOSTFILE"], 'r') as f:
                  hosts = json.load(f)
              
              # Always sync against the lexicographically first IP
              master_ip = hosts[0].split(":")[0]
              
              print("ЁЯЪж Waiting for peer at barrier...")
              sync_barrier(rank, master_ip, 12346)
              time.sleep(5) # Cooldown to ensure socket is fully released

              try:
                  world = dist.init(strict=True)
                  print(f"тЬЕ Rank {rank}: Connected. World Size: {world.size()}")

                  weights = mx.array([10.0, 10.0])
                  grad = mx.array([float(rank + 1), float(rank + 1)])

                  print(f"Rank {rank}: All-Reduce Summing...")
                  global_sum = dist.all_sum(grad, group=world)
                  
                  avg_grad = global_sum / world.size()
                  weights = weights - (0.1 * avg_grad)
                  
                  expected = 9.85
                  if abs(weights[0].item() - expected) < 1e-5:
                      print(f"тЬи SUCCESS: Rank {rank} validated.")
                  else:
                      print(f"тЭМ MATH ERROR: Got {weights[0].item()}")
                      sys.exit(1)

              except Exception as e:
                  print(f"тЭМ MLX Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 train_hardened.py
