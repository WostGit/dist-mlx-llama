name: "MLX Resilient Distributed Test (Chaos Edition)"
on: workflow_dispatch

jobs:
  distributed-training:
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        rank: [0, 1]
    
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 1. Environment & Network Shaping
        run: |
          python3 -m venv venv
          ./venv/bin/python3 -m pip install --upgrade pip mlx
          # Apply network shaping if possible (non-blocking)
          (sudo dnctl pipe 1 config delay 50ms && sudo dnctl add 1 pipe 1 ip from any to any) || echo "Network shaping skipped"

      - name: 🛡️ 2. Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-dns=false

      - name: 🚀 3. Hardened Distributed SGD
        run: |
          export PYTHONUNBUFFERED=1
          MY_IP=$(tailscale ip -4)
          
          echo "🔍 Discovering peers..."
          for i in {1..30}; do
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            [[ ! -z "$PEER_IP" && "$PEER_IP" != "null" ]] && break
            sleep 5
          done

          if [[ -z "$PEER_IP" || "$PEER_IP" == "null" ]]; then
            echo "❌ ERROR: Peer discovery timed out."
            exit 1
          fi

          # Decide Master/Worker
          if [[ "$MY_IP" < "$PEER_IP" ]]; then
             export MLX_RANK=0
             MASTER=$MY_IP
             WORKER=$PEER_IP
          else
             export MLX_RANK=1
             MASTER=$PEER_IP
             WORKER=$MY_IP
          fi

          # CRITICAL FIX: Export these for MLX to see them!
          export MLX_WORLD_SIZE=2
          export MLX_HOSTFILE=$(pwd)/hostfile.json
          echo "[\"$MASTER:12345\", \"$WORKER:12345\"]" > $MLX_HOSTFILE

          echo "📋 Config: Rank=$MLX_RANK, Master=$MASTER, Worker=$WORKER"

          cat <<EOF > train_hardened.py
          import os, sys, time, socket, json, signal
          import mlx.core as mx
          import mlx.core.distributed as dist

          def watchdog(signum, frame):
              print("\n🚨 CRITICAL FAILURE: Process deadlocked. Terminating.")
              sys.exit(2)
          
          signal.signal(signal.SIGALRM, watchdog)
          signal.alarm(90) 

          def sync_barrier(role, addr, port):
              try:
                  if role == 0:
                      with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                          s.settimeout(60)
                          s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                          s.bind((addr, port)); s.listen(1)
                          print(f"Master waiting on {addr}:{port}...")
                          s.accept()[0].close()
                  else:
                      start = time.time()
                      while time.time() - start < 60:
                          try:
                              socket.create_connection((addr, port), timeout=2).close()
                              print("Connected to Master.")
                              return
                          except: time.sleep(2)
                      raise TimeoutError("Handshake failed")
              except Exception as e:
                  print(f"❌ Barrier Error: {e}"); sys.exit(1)

          def main():
              # Read from exported environment variables
              rank = int(os.environ.get("MLX_RANK", -1))
              hostfile = os.environ.get("MLX_HOSTFILE")
              
              with open(hostfile, 'r') as f:
                  hosts = json.load(f)
              
              master_ip = hosts[0].split(":")[0]
              sync_barrier(rank, master_ip, 12346)

              try:
                  world = dist.init(strict=True)
                  print(f"✅ Rank {rank}: Cluster Active.")

                  weights = mx.array([10.0, 10.0])
                  grad = mx.array([float(rank + 1), float(rank + 1)])

                  print(f"Rank {rank}: Synchronizing...")
                  global_sum = dist.all_sum(grad, group=world)
                  
                  avg_grad = global_sum / world.size()
                  weights = weights - (0.1 * avg_grad)
                  
                  if mx.allclose(weights, mx.array([9.85, 9.85])):
                      print(f"✨ SUCCESS: Node {rank} validated training step.")
                      signal.alarm(0)
                  else:
                      print(f"❌ CONSENSUS FAILURE: Got {weights.tolist()}")
                      sys.exit(1)

              except Exception as e:
                  print(f"❌ MLX Runtime Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          ./venv/bin/python3 train_hardened.py
